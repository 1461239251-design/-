<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="陈泽均个人剪辑师作品集，展示影视剪辑、广告短片、预告片与视觉叙事作品。"
    />
    <title>陈泽均 | 剪辑师作品集</title>
  </head>
  <body>
    <!-- SVG filters for frosted glass texture -->
    <svg style="position:fixed;width:0;height:0;pointer-events:none;" aria-hidden="true">
      <defs>
        <!-- High-frequency fine glass grain -->
        <filter id="glass-grain" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise" />
          <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
          <feComponentTransfer in="gray" result="alpha">
            <feFuncA type="linear" slope="0.04" />
          </feComponentTransfer>
        </filter>
        <filter id="glass-blur">
          <feGaussianBlur stdDeviation="80" />
        </filter>
      </defs>
    </svg>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#060d16;color:rgba(255,255,255,0.6);font-family:sans-serif;font-size:16px;letter-spacing:2px;">
        陈泽均 · 剪辑师作品集
      </div>
    </div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#060d16;color:#fff;font-family:sans-serif;">
        <p>请启用 JavaScript 以浏览作品集。</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
